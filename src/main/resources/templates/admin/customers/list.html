<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Clients</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    
    <div class="container">
        
        <div class="flex-between">
            <h1>Annuaire des Clients</h1>
            <div>
                <a th:href="@{/admin/dashboard}" style="margin-right: 15px; color: var(--text-muted);">⬅ Retour au Tableau de bord</a>
                <a th:href="@{/admin/clients/nouveau}" class="btn btn-success">+ Ajouter un client</a>
            </div>
        </div>

        <div class="card" style="padding: 1rem 2rem; margin-bottom: 1rem;">
            <form th:action="@{/admin/clients}" method="get" class="search-bar" style="display: flex; gap: 0.5rem;">
                <input type="text" name="keyword" th:value="${keyword}" style="min-width: 300px; padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-md);" placeholder="Rechercher par raison sociale, nom, identifiant...">
                <button type="submit" class="btn btn-primary">🔍 Filtrer</button>
                <a th:href="@{/admin/clients}" class="btn" style="background: #f1f5f9; color: var(--text-muted);">Réinitialiser</a>
            </form>
        </div>
        
        <div th:if="${successMessage}" class="alert alert-success">
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger">
            <span th:text="${errorMessage}"></span>
        </div>

        <div class="card table-wrapper" style="padding: 0;"> 
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Raison Sociale</th>
                        <th>Nom Contact</th>
                        <th>Identifiant (Espace Client)</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="customer : ${customers}">
                        <td th:text="${customer.id}" class="tech-font"></td>
                        <td th:text="${customer.corporateName}" style="font-weight: 500;"></td>
                        <td th:text="${customer.name}"></td>
                        <td>
                            <span th:if="${customer.appUser != null}" class="badge badge-neutral" th:text="${customer.appUser.username}"></span>
                            <span th:if="${customer.appUser == null}" style="color: var(--danger); font-style: italic;">Aucun compte</span>
                        </td>
                        <td style="text-align: right;">
                            <a th:href="@{/admin/clients/editer/{id}(id=${customer.id})}" class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">Éditer</a>
                            <a th:href="@{/admin/clients/supprimer/{id}(id=${customer.id})}" class="btn btn-danger" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; margin-left: 5px;" onclick="return confirm('Attention : Cela supprimera aussi le compte de connexion du client. Continuer ?');">Supprimer</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(customers)}">
                        <td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted); font-style: italic;">Aucun client enregistré pour le moment.</td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${totalPages > 1}" style="padding: 1rem; border-top: 1px solid var(--border); background: #f8fafc; text-align: center;">
                <ul style="display: inline-flex; list-style: none; padding: 0; gap: 0.5rem; margin: 0;">
                    <li th:classappend="${currentPage == 0 ? 'disabled' : ''}" style="display: inline;">
                        <a th:href="@{/admin/clients(page=${currentPage - 1}, keyword=${keyword})}" class="btn" style="background: white; border: 1px solid var(--border); color: var(--text-main);">«</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" style="display: inline;">
                        <a th:href="@{/admin/clients(page=${i}, keyword=${keyword})}" 
                           th:text="${i + 1}" 
                           class="btn" 
                           th:style="${currentPage == i ? 'background: var(--primary); color: white;' : 'background: white; border: 1px solid var(--border); color: var(--text-main);'}"></a>
                    </li>
                    <li th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}" style="display: inline;">
                        <a th:href="@{/admin/clients(page=${currentPage + 1}, keyword=${keyword})}" class="btn" style="background: white; border: 1px solid var(--border); color: var(--text-main);">»</a>
                    </li>
                </ul>
            </div>
        </div>
        
    </div>

</body>
</html>
